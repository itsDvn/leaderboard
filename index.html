<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard Blox Fruits</title>
  <style>
    body {
      background: black;
      color: red;
      font-family: Arial;
      text-align: center;
    }
    h1 {
      margin-top: 20px;
    }
    .card {
      background: #111;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>🏆 Leaderboard</h1>
<div id="leaderboard"></div>

<script>
const url = "PASTE_LINK_RAW_JSON_DI_SINI";

fetch(url)
  .then(res => res.json())
  .then(data => {
    const sorted = Object.entries(data)
      .sort((a,b) => b[1].level - a[1].level)
      .slice(0, 10);

    const container = document.getElementById("leaderboard");

    sorted.forEach((user, i) => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <h3>#${i+1}</h3>
        <p>User ID: ${user[0]}</p>
        <p>Level: ${user[1].level}</p>
      `;
      container.appendChild(div);
    });
  });
</script>

</body>
</html>
